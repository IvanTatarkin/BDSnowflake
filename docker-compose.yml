services:
  postgres:
    image: postgres:16
    container_name: bdsnowflake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bdsnowflake
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
      - ./data/raw:/data/raw:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bdsnowflake"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
